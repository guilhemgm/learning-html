<!--Ce q'on a fait depuis le début ne correspond pas à la structure normale d'un HTML-->
<!--Maintenant, voici la vrai structure-->

<!--doctype est une metadonnée pour le navigateur afin de spécifier la version d'HTML-->
<!DOCTYPE html>
<!--HTML tag nécessaire pour la structure du fichier-->
<html>
    <!--head for metadata and things not rendered on the tab-->
    <head>
        <link rel="stylesheet" href="style.css">
    </head>

    <!--body for the elements rendered on the page, the actual website-->
    <body>
        <img src="google.png">
        <input type="text"><br>
        <button>Google Search</button>
        <button>I'm Feeling Lucky</button>
        <p>We protect you privacy. <a href="blog.html">Learn how.</a></p>
    </body>
</html>
